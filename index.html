<!DOCTYPE html>
<html>


<head>
  <meta charset="UTF-8">
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@c-frame/aframe-particle-system-component@1.2.0/dist/aframe-particle-system-component.min.js"></script>
</head>




<body>




<a-scene
  background="color: black"
  fog="type: exponential; color: #020204; density: 0.09">




 
  <a-light type="ambient" intensity="0.4"></a-light>




  <a-light
    id="mainLight"
    type="point"
    position="0 3 -60"
    intensity="1.5"
    color="#00ffff">
  </a-light>




 

<a-entity
  position="0 1.5 -60"
  sound="src: url(sounds/backgroundnoise.wav);
         autoplay: true;
         loop: true;
         positional: true;
         maxDistance: 50;
         refDistance: 2;
         rolloffFactor: 1">
</a-entity>




  <a-assets>
    <a-asset-item id="sken" src="assets/cesta4.glb"></a-asset-item>




      <a-asset-item
    id="sken2"
    src="assets/tunelkamen2.glb">
  </a-asset-item>




  </a-assets>




   
 
  <a-entity
    gltf-model="#sken"
    position="0 5 -85"
    scale="1 1 1"
    rotation = "10 0 0">
   
  </a-entity>




  <a-entity
  gltf-model="#sken2"
  position="1 3 -10"
  scale="1 1 1">
</a-entity>


  <a-light
    type="ambient"
    intensity="10"
    color="#8899aa">
  </a-light>


  <a-light
    id="mainLight"
    type="point"
    position="0 3 -60"
    intensity="10"
    distance="35"
    decay="1.5"
    color="#88ffff">
  </a-light>

 
  <a-light
    type="spot"
    position="0 5 -45"
    angle="35"
    penumbra="0.6"
    intensity="10"
    color="#66ffff"
    target="#tunnelTarget">
  </a-light>

  
  <a-entity
    id="tunnelTarget"
    position="0 1 -80">
  </a-entity>


  <a-light
    type="point"
    position="0 2 -120"
    intensity="10"
    distance="25"
    color="#220044">
  </a-light>









</a-scene>






</body>
</html>
